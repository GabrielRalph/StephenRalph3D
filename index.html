<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEPHEN RALPH</title>
</head>
<body>
    <h1>Stephen Ralph <a download="ModelFile.stl" stl href="./mesh-400K.stl"></a></h1>
    <span class = "model-load-status">Loading...</span>
    <dads-scan-scene 
        environment = "./uluru-red.jpg" 
        src = "./mesh-400K.ply"
        mat = "-30.4, -3.98, -34.5, 0.00, -34.8, 4.05, 30.2, 0.00, 0.429, 45.9, -5.66, 0.00, 0.00, 0.00, 0.00, 1.00"></dads-scan-scene>
</body>

<script type="module" src="./index.js"></script>
<style>
    body {
        margin: 0;
        overflow: hidden;
    }
    dads-scan-scene {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }
    h1 {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-family: Arial, Helvetica, sans-serif;
        z-index: 1;
        font-size: 5vw;
        display: flex;
        white-space: nowrap;
    }

     .model-load-status {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: Arial, Helvetica, sans-serif;
        z-index: 1;
        font-size: 4vw;
    }
    .model-load-status[loaded] {
        display: none;
    }

    a {
        color: black;
        text-decoration: none;
        margin: 0 0.3em;
        cursor: pointer;
    }
    a[stl]::after {
        background-image: url(./upload.svg);
        background-size: contain;
        background-repeat: no-repeat;
        width: 1.1em;
        height: 1.5em;
        content: " ";
        display: inline-block;
    }
</style>
</html>
